<div class="flex-1 flex flex-col">
  <div class="mb-7">
    <h1 class="font-serif text-3xl font-bold">Tags</h1>
    <p class="text-secondary text-sm mt-1">Add flexible labels to any income entry.</p>
  </div>

  <div class="grid lg:grid-cols-3 gap-6 flex-1">
  <div class="lg:col-span-1">
    <div class="card card-pad sticky top-2">
      <h2 class="font-serif text-lg font-semibold mb-4">
        {{ editId() ? 'Edit tag' : 'New tag' }}
      </h2>
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label class="field-label">Name</label>
          <input class="input" formControlName="name" placeholder="e.g. tax-free" />
        </div>
        <div>
          <label class="field-label">Color</label>
          <div class="flex flex-wrap gap-2">
            @for (color of palette; track color) {
              <button
                type="button"
                class="swatch"
                [class.swatch-active]="form.value.color === color"
                [style.background]="color"
                (click)="form.patchValue({ color })"
              ></button>
            }
          </div>
        </div>
        <div class="flex gap-2 pt-1">
          <button class="btn btn-primary flex-1" [disabled]="saving()">
            {{ editId() ? 'Save' : 'Create' }}
          </button>
          @if (editId()) {
            <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
          }
        </div>
      </form>
    </div>
  </div>

  <div class="lg:col-span-2">
    @if (loading()) {
      <app-spinner height="260px" />
    } @else if (items().length) {
      <div class="card card-pad">
        <div class="flex flex-wrap gap-2.5">
          @for (item of items(); track item.id) {
            <div
              class="tag-pill"
              [style.--chip-color]="item.color"
            >
              <span class="dot" [style.background]="item.color"></span>
              {{ item.name }}
              <button class="tag-edit" (click)="edit(item)">✎</button>
              <button class="tag-edit text-negative" (click)="remove(item)">✕</button>
            </div>
          }
        </div>
      </div>
    } @else {
      <div class="card">
        <app-empty-state icon="#" title="No tags yet" message="Create tags to label your income flexibly." />
      </div>
    }
  </div>
</div>
</div>
